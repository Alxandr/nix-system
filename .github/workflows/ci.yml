name: CI
on:
  push: {}

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Configure git
        run: |
          git config --global core.autocrlf false
          git config --global core.symlinks true
          git config --global fetch.parallel 32

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Nix
        uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3.20.0
        with:
          extra-conf: |
            keep-env-derivations = true
            keep-outputs = true

      - uses: YoloDev/actions-attic@7a1c97712ee0e9953a06181473792f2ed318bc82 # v0.1.0
        id: attic
        with:
          server: https://attic.alxandr.me/attic/
          cacheName: alxandr
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Check Nix flake Nixpkgs inputs
        uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12

      - name: Show flake
        run: nix flake show --extra-experimental-features pipe-operators

      - name: Check flake
        run: nix flake check --extra-experimental-features pipe-operators
